name: Build VNote ARM64 DEB

# 触发条件：允许在 Actions 面板手动点击运行
on:
  workflow_dispatch:

jobs:
  build:
    # 注意：ubuntu-24.04-arm 目前对 Public 仓库免费。
    # 如果你的仓库是私有(Private)的，GitHub 可能会计费或提示找不到 runner。
    runs-on: ubuntu-24.04-arm
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive # VNote 依赖子模块，必须开启递归拉取
          fetch-depth: 0

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          # 安装编译工具链及 VNote 必需的 Qt6 依赖 (包含 WebEngine, Svg, Core5Compat 等)
          sudo apt-get install -y build-essential cmake git ninja-build pkg-config \
            qt6-base-dev qt6-webengine-dev qt6-svg-dev qt6-tools-dev qt6-tools-dev-tools \
            libqt6core5compat6-dev libqt6webchannel6-dev libgl1-mesa-dev rpm cpack
            
      - name: Configure and Build
        run: |
          mkdir build && cd build
          # 使用 CMake 配置项目，指定为 Release 版本和标准的 /usr 安装路径
          cmake .. -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr -GNinja
          # 执行编译
          ninja

      - name: Package to DEB
        run: |
          cd build
          # 调用 CPack 根据 CMakeLists 中的 install 规则生成 .deb 安装包
          cpack -G DEB

      - name: Upload DEB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: vnote-arm64-deb
          path: build/*.deb
          retention-days: 7
