name: Build VNote ARM64 DEB (Debian Trixie)

# 触发条件：允许在 Actions 面板手动点击运行
on:
  workflow_dispatch:

jobs:
  build:
    # 物理机依然使用 ARM64 环境，保证编译速度
    runs-on: ubuntu-24.04-arm
    
    # 【核心改动】直接启动一个纯净的 Debian 13 容器作为编译环境，对齐你的本地系统
    container: debian:trixie
    
    steps:
      - name: Install Git for Checkout
        run: |
          apt-get update
          # 在空容器中必须先装 git，否则下面的 checkout 代码拉取会失败
          apt-get install -y git ca-certificates

      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive # VNote 依赖子模块，必须开启递归拉取
          fetch-depth: 0

      - name: Install System Dependencies
        run: |
          apt-get update
          # 安装编译工具链及 VNote 必需的 Qt6 依赖 (适配 Debian 源)
          apt-get install -y build-essential cmake ninja-build pkg-config \
            qt6-base-dev qt6-webengine-dev qt6-svg-dev qt6-tools-dev qt6-tools-dev-tools \
            libqt6core5compat6-dev libqt6webchannel6-dev libgl1-mesa-dev rpm
            
      - name: Configure and Build
        run: |
          mkdir build && cd build
          # 使用 CMake 配置项目
          cmake .. -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr -GNinja
          # 执行编译
          ninja

      - name: Package to DEB
        run: |
          cd build
          # 根据 Debian 环境自动生成正确的 deb 安装包
          cpack -G DEB

      - name: Upload DEB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: vnote-arm64-deb-trixie
          path: build/*.deb
          retention-days: 7
