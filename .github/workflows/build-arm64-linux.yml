name: Build VNote ARM64 DEB (Debian Trixie)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    container: debian:trixie
    
    steps:
      - name: Install Git for Checkout
        run: |
          apt-get update
          apt-get install -y git ca-certificates

      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install System Dependencies
        run: |
          apt-get update
          apt-get install -y build-essential cmake ninja-build pkg-config \
            qt6-base-dev qt6-webengine-dev qt6-svg-dev qt6-tools-dev qt6-tools-dev-tools \
            libqt6core5compat6-dev qt6-webchannel-dev libgl1-mesa-dev rpm
            
      - name: Configure and Build
        run: |
          mkdir build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr -GNinja
          ninja

      - name: Package to DEB
        run: |
          cd build
          cpack -G DEB

      - name: Upload DEB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: vnote-arm64-deb-trixie
          path: build/*.deb
          retention-days: 7
